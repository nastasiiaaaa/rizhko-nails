<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIZHKO_NAILS | Студія манікюру</title>
    <link rel="stylesheet" href="style.css">
    <!-- EasyWeek Booking Software: https://easyweek.com.ua -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>

    <header>
        <h1>Привіт, я Ольга! 🖤</h1>
        <p>Твій майстер ідеального манікюру.</p>
        <a href="https://www.instagram.com/rizhko_nails_/" target="_blank">Instagram</a>
    </header>

    <section class="widget-container">
  
        <form name="booking" method="POST" data-netlify="true">
            <input type="hidden" name="form-name" value="booking" />

            <div class="step-block">
                <h3>1. Оберіть локацію</h3>
                <div class="city-selector">
                    <label class="city-card">
                        <input type="radio" name="city" value="Новояворівськ" checked>
                        <div class="city-content">📍 м. Новояворівськ</div>
                    </label>
                    <label class="city-card">
                        <input type="radio" name="city" value="Івано-Франкове">
                        <div class="city-content">📍 смт. Івано-Франкове</div>
                    </label>
                </div>
            </div>

            <div class="step-block">
                <h3>2. Оберіть послуги</h3>
                
                <h4 class="category-title">Манікюр</h4>
                
                <label class="service-label">
                    <input type="checkbox" name="services" value="Манікюр з покриттям (450 грн)">
                    <div class="service-card">
                        <span class="service-name">Зняття + Чистка + Укріплення з покриттям</span>
                        <span class="service-price">450 грн</span>
                    </div>
                </label>

                <label class="service-label">
                    <input type="checkbox" name="services" value="Чистка без покриття (250 грн)">
                    <div class="service-card">
                        <span class="service-name">Зняття + чистка (без покриття)</span>
                        <span class="service-price">250 грн</span>
                    </div>
                </label>

                <h4 class="category-title">Нарощення</h4>
                
                <label class="service-label">
                    <input type="checkbox" name="services" value="Нарощення 1 ніготь (40 грн)">
                    <div class="service-card">
                        <span class="service-name">Нарощення (1 ніготь)</span>
                        <span class="service-price">40 грн</span>
                    </div>
                </label>

                <label class="service-label">
                    <input type="checkbox" name="services" value="Нарощення довжина 1-2 (650 грн)">
                    <div class="service-card">
                        <span class="service-name">Нарощення (довжина 1-2)</span>
                        <span class="service-price">650 грн</span>
                    </div>
                </label>

                <label class="service-label">
                    <input type="checkbox" name="services" value="Нарощення довжина 3-4 (750 грн)">
                    <div class="service-card">
                        <span class="service-name">Нарощення (довжина 3-4)</span>
                        <span class="service-price">750 грн</span>
                    </div>
                </label>

                <h4 class="category-title">Дизайн</h4>
                
                <label class="service-label">
                    <input type="checkbox" name="services" value="Френч (+50 грн)">
                    <div class="service-card">
                        <span class="service-name">Френч</span>
                        <span class="service-price">+50 грн</span>
                    </div>
                </label>

                <label class="service-label">
                    <input type="checkbox" name="services" value="Дизайн (+50/100 грн)">
                    <div class="service-card">
                        <span class="service-name">Дизайн (від складності)</span>
                        <span class="service-price">+50/100 грн</span>
                    </div>
                </label>
            </div>

            <div class="step-block">
                <h3>3. Ваші дані для запису</h3>
                
                <input type="text" name="surname" placeholder="Прізвище" required>
                <input type="text" name="name" placeholder="Ім'я" required>
                <input type="text" name="patronymic" placeholder="По батькові" required>
                <input type="tel" name="phone" placeholder="Номер телефону" required>
                <input type="text" name="instagram" placeholder="Ваш Instagram (якщо є)">

                <label class="date-label">Оберіть дату:</label>
                 <select name="date" id="date-select" required>
                  <option value="">Завантаження дат...</option>
                 </select>

                <label class="date-label">Оберіть час:</label>
                 <select name="time" id="time-select" required>
                  <option value="">Спочатку оберіть місто...</option>
                 </select>    

                <button type="submit">Підтвердити запис</button>
            </div>

        </form>
    </section>

    <div id="success-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>Дякую за запис! 🖤</h3>
            <p>Я отримала ваші дані. Зв'яжуся з вами найближчим часом для підтвердження!</p>
            <button type="button" class="close-btn" onclick="closeModal()">Супер, чекаю</button>
        </div>
    </div>

        <script>
            // Завантаження даних
    fetch('content.json')
        .then(response => response.json())
        .then(data => {
            const cityInputs = document.querySelectorAll('input[name="city"]');
            const dateSelect = document.getElementById('date-select');
            const timeSelect = document.getElementById('time-select');

            // Функція оновлення дат при виборі міста
            function updateDates() {
                const selectedCity = document.querySelector('input[name="city"]:checked').value;
                const cityKey = (selectedCity === "Новояворівськ") ? 'novoyavorivsk' : 'ivano_frankove';
                const schedule = data[cityKey] || []; 

                if (schedule.length === 0) {
                    dateSelect.innerHTML = '<option value="">Немає вільних дат</option>';
                    timeSelect.innerHTML = '<option value="">-</option>';
                    return;
                }

                // Заповнюємо список дат
                dateSelect.innerHTML = '<option value="">Оберіть дату...</option>' + 
                    schedule.map(day => `<option value="${day.date}">${day.date}</option>`).join('');
                
                // Очищаємо години, поки не обрана конкретна дата
                timeSelect.innerHTML = '<option value="">Спочатку оберіть дату...</option>';
            }

            // Функція оновлення годин при виборі дати
            function updateTimes() {
                const selectedCity = document.querySelector('input[name="city"]:checked').value;
                const cityKey = (selectedCity === "Новояворівськ") ? 'novoyavorivsk' : 'ivano_frankove';
                const schedule = data[cityKey] || [];
                const selectedDate = dateSelect.value;

                if (!selectedDate) {
                    timeSelect.innerHTML = '<option value="">Спочатку оберіть дату...</option>';
                    return;
                }

                // Шукаємо години для обраної дати
                const selectedDay = schedule.find(day => day.date === selectedDate);
                
                if (selectedDay && selectedDay.hours && selectedDay.hours.length > 0) {
                    timeSelect.innerHTML = '<option value="">Оберіть час...</option>' + 
                        selectedDay.hours.map(h => `<option value="${h}">${h}</option>`).join('');
                } else {
                    timeSelect.innerHTML = '<option value="">Немає вільних годин</option>';
                }
            }

            // Додаємо слухачів подій
            cityInputs.forEach(input => input.addEventListener('change', updateDates));
            dateSelect.addEventListener('change', updateTimes);
            
            // Запускаємо при першому завантаженні
            updateDates();
        });

    const form = document.forms["booking"];
    const modal = document.getElementById("success-modal");

    form.addEventListener("submit", function(event) {
        event.preventDefault(); 
        fetch("/", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: new URLSearchParams(new FormData(form)).toString()
        }).then(() => {
            modal.style.display = "flex"; 
            form.reset(); 
        });
    });

    function closeModal() {
        modal.style.display = "none";
    }
</script>

</body>
</html>
